services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fire_intelligence
      POSTGRES_USER: fire_intelligence
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fire_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      APP_ENVIRONMENT: production
      APP_DATABASE_URL: postgresql+psycopg://fire_intelligence:${POSTGRES_PASSWORD}@database/fire_intelligence
      APP_AUTH_SECRET_KEY: ${APP_AUTH_SECRET_KEY:?Set APP_AUTH_SECRET_KEY}
      APP_CORS_ORIGINS: '["http://localhost:3000"]'
      APP_STORAGE_ROOT: /data/storage
      APP_AI_BASE_URL: ${APP_AI_BASE_URL:-}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-}
      APP_LLM_MODEL: ${APP_LLM_MODEL:-}
      APP_VISION_MODEL: ${APP_VISION_MODEL:-}
      APP_SPEECH_MODEL: ${APP_SPEECH_MODEL:-}
      APP_EMBEDDING_MODEL: ${APP_EMBEDDING_MODEL:-}
    volumes:
      - object-storage:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  object-storage:
