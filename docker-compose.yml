services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fire_intelligence
      - STORAGE_PROVIDER=local
      - LOCAL_STORAGE_PATH=/app/data/storage
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    env_file:
      - backend/.env
    volumes:
      - backend-storage:/app/data/storage
      - backend-templates:/app/data/templates
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fire_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped

volumes:
  postgres-data:
  backend-storage:
  backend-templates:
  chroma-data:
